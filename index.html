<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Encrypt / Decrypt</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px; /* Added padding to prevent the card from touching screen edges on mobile */
    }
    .card {
      background: #16213e;
      padding: 30px;
      border-radius: 16px;
      width: 100%; /* Changed from fixed 420px to 100% width */
      max-width: 420px; /* Restricts the card from expanding too wide on desktop */
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      position: relative;
    }
    h2 {
      color: #e94560;
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.5rem; /* Fluid font sizing */
    }
    label {
      color: #a0a0a0;
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      font-size: 14px;
      margin-bottom: 15px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #e94560;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-encrypt {
      background: #e94560;
      color: #fff;
    }
    .btn-encrypt:hover { background: #c73e54; }
    .btn-decrypt {
      background: #533483;
      color: #fff;
    }
    .btn-decrypt:hover { background: #3f2770; }
    .btn-copy {
      background: #0f3460;
      color: #fff;
      margin-bottom: 15px;
      width: 100%; /* Ensures the copy button spans the full card width */
    }
    .btn-copy:hover { background: #1a4a7a; }
    .output-box {
      background: #0f3460;
      padding: 12px;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      word-break: break-all;
      min-height: 60px;
      border: 1px dashed #e94560;
      margin-bottom: 15px;
    }
    .hint {
      color: #666;
      font-size: 11px;
      text-align: center;
      margin-top: 15px;
      line-height: 1.4;
    }

    /* Toast notification styles */
    #toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #e94560;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, top 0.3s ease;
      z-index: 9999;
      width: max-content;
      max-width: 90%; /* Stops the toast from clipping off the screen edge on tiny devices */
      text-align: center;
    }
    #toast.show {
      opacity: 1;
      top: 30px;
    }

    /* Media query for ultra-small mobile screens (e.g., older devices under 360px wide) */
    @media (max-width: 360px) {
      .card {
        padding: 20px; /* Scale down internal padding slightly */
      }
      .btn-row {
        flex-direction: column; /* Stack Encrypt and Decrypt buttons vertically if horizontal space runs out */
      }
    }
  </style>
</head>
<body>

<div id="toast">Copied to clipboard!</div>

<div class="card">
  <h2>🔐 Simple Encrypt / Decrypt</h2>

  <label>Secret Key (password)</label>
  <input type="text" id="key" placeholder="Enter a secret key..." value="text-crypt">

  <label>Your Message</label>
  <textarea id="message" rows="3" placeholder="Type your message here..."></textarea>

  <div class="btn-row">
    <button class="btn-encrypt" onclick="doEncrypt()">🔒 Encrypt</button>
    <button class="btn-decrypt" onclick="doDecrypt()">🔓 Decrypt</button>
  </div>

  <label>Result</label>
  <div class="output-box" id="output">Result will appear here...</div>
  <button class="btn-copy" onclick="copyResult()">📋 Copy Result</button>

  
  
  <div class="hint">
    Use the same key to encrypt and decrypt.<br>
    The encrypted text is safe to send over any channel.
  </div>
</div>

<script>
  // ============================================
  // SIMPLE XOR CIPHER
  // ============================================

  function encrypt(text, key) {
    let result = "";
    for (let i = 0; i < text.length; i++) {
      const charCode = text.charCodeAt(i) ^ key.charCodeAt(i % key.length);
      result += String.fromCharCode(charCode);
    }
    return btoa(result);
  }

  function decrypt(base64Text, key) {
    let text = atob(base64Text);
    let result = "";
    for (let i = 0; i < text.length; i++) {
      const charCode = text.charCodeAt(i) ^ key.charCodeAt(i % key.length);
      result += String.fromCharCode(charCode);
    }
    return result;
  }

  // ============================================
  // UI FUNCTIONS
  // ============================================

  let toastTimeout;

  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");

    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toast.classList.remove("show");
    }, 5000);
  }

  function doEncrypt() {
    const key = document.getElementById("key").value;
    const message = document.getElementById("message").value;

    if (!key || !message) {
      showToast("Please enter both a key and a message!");
      return;
    }

    const encrypted = encrypt(message, key);
    document.getElementById("output").textContent = encrypted;
  }

  function doDecrypt() {
    const key = document.getElementById("key").value;
    const message = document.getElementById("message").value;

    if (!key || !message) {
      showToast("Please enter both a key and the encrypted text!");
      return;
    }

    try {
      const decrypted = decrypt(message, key);
      document.getElementById("output").textContent = decrypted;
    } catch (e) {
      showToast("Decryption failed! Wrong key or invalid encrypted text.");
    }
  }

  function copyResult() {
    const text = document.getElementById("output").textContent;
    if (text === "Result will appear here...") {
      showToast("Nothing to copy yet!");
      return;
    }
    navigator.clipboard.writeText(text).then(() => {
      showToast("Copied to clipboard!");
    });
  }
</script>

</body>
</html>
